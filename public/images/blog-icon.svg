<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300" width="320" height="300">

  <!-- BLOG tab (behind screen, dark charcoal) -->
  <rect x="88" y="18" width="148" height="82" rx="6" fill="#3a3a3a"/>
  <!-- Browser dots row -->
  <circle cx="107" cy="33" r="4" fill="#555"/>
  <circle cx="120" cy="33" r="4" fill="#555"/>
  <circle cx="133" cy="33" r="4" fill="#555"/>
  <!-- BLOG text -->
  <text x="162" y="80" font-family="Arial Black, Helvetica, sans-serif"
        font-weight="900" font-size="34" fill="white" text-anchor="middle"
        letter-spacing="2">BLOG</text>

  <!-- Laptop screen bezel (dark frame) -->
  <rect x="58" y="80" width="204" height="156" rx="8" fill="#2a2a2a"/>

  <!-- Screen white area (content) -->
  <rect x="66" y="88" width="188" height="140" rx="4" fill="#f8f8f8"/>

  <!-- Image placeholder box -->
  <rect x="82" y="98" width="156" height="88" rx="3" fill="#d8d8d8"/>
  <!-- Mountain icon inside placeholder -->
  <polygon points="116,172 148,130 180,172" fill="#b8b8b8"/>
  <polygon points="148,130 175,158 121,158" fill="#c4c4c4"/>
  <circle cx="174" cy="118" r="11" fill="#c0c0c0"/>

  <!-- Text lines below image -->
  <rect x="74" y="196" width="172" height="8" rx="4" fill="#d0d0d0"/>
  <rect x="74" y="210" width="172" height="8" rx="4" fill="#d0d0d0"/>
  <rect x="74" y="224" width="120" height="8" rx="4" fill="#d0d0d0"/>

  <!-- Laptop base / keyboard deck (black) -->
  <rect x="42" y="233" width="236" height="22" rx="5" fill="#1a1a1a"/>
  <!-- Trackpad indent -->
  <rect x="126" y="237" width="68" height="10" rx="3" fill="#2a2a2a"/>

  <!-- Laptop feet shadow / bottom bar -->
  <rect x="56" y="252" width="208" height="6" rx="3" fill="#111"/>

  <!-- Speech bubble body (dark charcoal oval) -->
  <ellipse cx="82" cy="168" rx="58" ry="46" fill="#3a3a3a"/>
  <!-- Bubble tail pointing bottom-right -->
  <polygon points="108,200 96,222 130,202" fill="#3a3a3a"/>
  <!-- Three dots inside bubble -->
  <circle cx="58"  cy="168" r="8" fill="white"/>
  <circle cx="82"  cy="168" r="8" fill="white"/>
  <circle cx="106" cy="168" r="8" fill="white"/>

</svg>
